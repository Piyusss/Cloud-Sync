server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: cloudsync

  # ── PostgreSQL (local Docker by default; Neon in production) ────────────────
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/cloudsync?user=cloudsync&password=cloudsync_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Redis (local Docker by default; Upstash in production) ──────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}
      timeout: 5000

  # ── Clerk JWT verification ───────────────────────────────────────────────────
  # Spring Security fetches Clerk's public keys automatically from this URL.
  # Get it from: Clerk Dashboard → API Keys → Advanced → JWT public key (JWKS format)
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${CLERK_JWKS_URI}

  servlet:
    # File bytes no longer pass through the app (direct browser <-> storage transfer),
    # so multipart bodies stay small. Bump only if you reintroduce server-side uploads.
    multipart:
      max-file-size: ${MAX_FILE_SIZE:10MB}
      max-request-size: ${MAX_FILE_SIZE:10MB}

# Object storage — S3-compatible (local MinIO by default; Backblaze B2 in production)
minio:
  endpoint: ${STORAGE_ENDPOINT:http://localhost:9002}
  access-key: ${STORAGE_ACCESS_KEY:minioadmin}
  secret-key: ${STORAGE_SECRET_KEY:minioadmin123}
  bucket: ${STORAGE_BUCKET:cloudsync}
  region: ${STORAGE_REGION:us-east-1}

# Presigned-URL lifetime (minutes) for direct browser <-> storage transfers
storage:
  presign-ttl-minutes: ${PRESIGN_TTL:360}

# CORS — comma-separated list of allowed frontend origins
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173}

# App
app:
  share-base-url: ${APP_SHARE_BASE_URL:http://localhost:5173}
  version-retention: ${VERSION_RETENTION:10}

# Logging
logging:
  level:
    com.cloudsync: ${LOG_LEVEL:DEBUG}
    org.springframework.security: INFO
